    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Selector </title>
 </head>
 
 
    <style>
    
        .card {
            background-color: lightblue;
            border: 2px solid black;
            padding: 20px;
            margin: 10px;
            width: 200px;
        }

        
        .box {
            color: red;
            background-color: lightyellow;
            border: 2px dashed green;
            padding: 20px;
            margin: 10px;
            width: 200px;
        }
    </style>

<body>

    <div class="card">
        <h3>Card 1</h3>
        
    </div>

    <div class="card">
        <h3>Card 2</h3>
        
    </div>

    <div class="card">
        <h3>Card 3</h3>
       
    </div>

    <div class="box">
        <h3>Box</h3>
        
    </div>
</body>
</html>
