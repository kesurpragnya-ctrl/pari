<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
      <style>
    
        ul li:nth-child(2) {
            color: red;
        }

        
        ul li:nth-child(4) {
            color: blue;
        }

    
        ul li:nth-child(6) {
            color: green;
        }
    </style>
<body>
    
    <h2>nth child</h2>

    <ul>
        <li>Task 1</li>
        <li>Task 2</li>
        <li>Task 3</li>
        <li>Task 4</li>
        <li>Task 5</li>
        <li>Task 6</li>
    </ul>
</body>
</html>
