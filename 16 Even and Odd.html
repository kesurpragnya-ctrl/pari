<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head> 
        
    <style>
        
        ul li:nth-child(even) {
            background-color: lightblue;
        }

        
        ul li:nth-child(odd) {
            background-color: lightgreen;
        }

        li {
            padding: 10px;
            margin: 5px;
            list-style-position: inside;
        }
    </style>
<body>
    
    <h2>Even and Odd </h2>

    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
        <li>Item 4</li>
        <li>Item 5</li>
        <li>Item 6</li>
        <li>Item 7</li>
        <li>Item 8</li>
    </ul>
</body>
</html>
